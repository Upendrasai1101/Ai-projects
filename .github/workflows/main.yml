name: Sync Panda AI V5 to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - 'panda_ai/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Sync all V5 files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "upendrasai1101@gmail.com"
          git config --global user.name "Upendrasai Chaturvedula"

          # ── Clone HF Space ──
          git clone https://Upendrasai:${HF_TOKEN}@huggingface.co/spaces/Upendrasai/Panda-AI-Official hf_space

          # ── Clear old files (preserve .git) ──
          cd hf_space
          find . -mindepth 1 -not -path './.git*' -delete
          cd ..

          # ── DEBUG: show repo structure ──
          echo "=== GitHub repo structure ==="
          find panda_ai -maxdepth 3 -type f 2>/dev/null | sort | head -40

          # ── Smart path detection ──
          if [ -f "panda_ai/app.py" ]; then
            SOURCE="panda_ai"
            echo "✅ Source: panda_ai/ (single level)"
          elif [ -f "panda_ai/panda_ai/app.py" ]; then
            SOURCE="panda_ai/panda_ai"
            echo "✅ Source: panda_ai/panda_ai/ (double level)"
          else
            echo "❌ ERROR: app.py not found in expected locations!"
            echo "Available files:"
            find . -name "app.py" 2>/dev/null
            exit 1
          fi

          # ── Copy core Python backend files ──
          # These are REQUIRED — fail if missing
          REQUIRED_FILES="app.py search_tool.py file_processor.py memory.py requirements.txt Dockerfile"
          for f in $REQUIRED_FILES; do
            if [ -f "$SOURCE/$f" ]; then
              cp "$SOURCE/$f" hf_space/
              echo "✅ Copied: $f"
            else
              echo "❌ MISSING required file: $f — build may fail!"
            fi
          done

          # ── Copy frontend files ──
          FRONTEND_FILES="index.html script.js"
          for f in $FRONTEND_FILES; do
            if [ -f "$SOURCE/$f" ]; then
              cp "$SOURCE/$f" hf_space/
              echo "✅ Copied: $f"
            else
              echo "⚠️ Missing frontend file: $f"
            fi
          done

          # ── Handle memory.json carefully ──
          # If memory.json exists in repo → sync it (contains user profile + critical facts)
          # If NOT in repo → create empty default on HF (never overwrite HF's live memory)
          if [ -f "$SOURCE/memory.json" ]; then
            cp "$SOURCE/memory.json" hf_space/memory.json
            echo "✅ Copied: memory.json (from repo)"
          elif [ -f "hf_space/memory.json" ]; then
            echo "ℹ️ memory.json not in repo — keeping existing HF version"
          else
            # Create default memory.json with user profile
            cat > hf_space/memory.json << 'EOF'
          {
            "name": "Upendrasai",
            "education": "Final-year MCA student, B.Sc Computer Science graduate",
            "role": "MCA Student and Developer",
            "job_target": "Java Developer or Full-Stack Developer",
            "location_preference": "Hyderabad or Bangalore",
            "skills": "Java, Python, Flask, Full-Stack Development",
            "project": "Panda AI — real-time AI chatbot",
            "srh_2026_fact": "T. Natarajan is NOT in SRH squad for IPL 2026",
            "ipl_note": "Always verify IPL 2026 squad from live search"
          }
          EOF
            echo "✅ Created: memory.json (default profile)"
          fi

          # ── Handle tasks.json — never overwrite live data ──
          if [ ! -f "hf_space/tasks.json" ]; then
            echo "[]" > hf_space/tasks.json
            echo "✅ Created: tasks.json (empty)"
          else
            echo "ℹ️ tasks.json preserved (live data)"
          fi

          # ── Handle README ──
          for readme in readme.md README.md Readme.md; do
            if [ -f "$SOURCE/$readme" ]; then
              cp "$SOURCE/$readme" hf_space/README.md
              echo "✅ Copied README: $readme"
              break
            fi
          done

          # ── Verify all critical files present ──
          echo ""
          echo "=== Final HF Space contents ==="
          ls -lah hf_space/
          echo ""

          # Fail-safe: ensure app.py made it
          if [ ! -f "hf_space/app.py" ]; then
            echo "❌ CRITICAL: app.py missing from hf_space! Aborting."
            exit 1
          fi

          # Fail-safe: ensure file_processor.py made it (caused ModuleNotFoundError before)
          if [ ! -f "hf_space/file_processor.py" ]; then
            echo "❌ CRITICAL: file_processor.py missing! Aborting."
            exit 1
          fi

          # ── Commit and push ──
          cd hf_space
          git add -A
          CHANGED=$(git diff --staged --stat)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️ No changes to sync."
          else
            echo "Changes: $CHANGED"
            git commit -m "V5 Accuracy Build: Live-First + Memory + Conflict Resolution [$(git -C .. rev-parse --short HEAD)]"
            git push https://Upendrasai:${HF_TOKEN}@huggingface.co/spaces/Upendrasai/Panda-AI-Official main
            echo "✅ Push successful!"
          fi
