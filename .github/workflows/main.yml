name: Sync panda_ai → Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when files inside panda_ai/ change
      - 'panda_ai/**'

jobs:
  sync-to-hf:
    name: Push panda_ai to HF Space
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout full GitHub repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history needed for sync
          lfs: true             # include LFS files if any

      # Step 2: Install HF CLI
      - name: Install huggingface_hub CLI
        run: pip install huggingface_hub

      # Step 3: Push ONLY the panda_ai/ subfolder to HF Space root
      - name: Upload panda_ai folder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          # Upload the entire panda_ai/ subfolder
          # folder_path  = local folder to upload
          # path_in_repo = "" means it becomes the root of the Space
          api.upload_folder(
              folder_path="panda_ai",
              repo_id="upendrasai1101/Panda-AI-Official",
              repo_type="space",
              path_in_repo="",          # uploads to Space ROOT (not a subfolder)
              commit_message=f"Auto-sync from GitHub: {os.environ.get('GITHUB_SHA','')[:7]}",
              ignore_patterns=[
                  ".git/*",
                  "__pycache__/*",
                  "*.pyc",
                  ".env",
                  ".env.*",
                  "*.key",
                  "*.pem",
              ],
          )
          print("Sync complete!")
          EOF
