name: Sync Panda AI to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - 'panda_ai/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push panda_ai/ contents to HF Space root
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "upendrasai1101@gmail.com"
          git config --global user.name "Upendrasai Chaturvedula"

          # Clone HF Space
          git clone https://Upendrasai:${HF_TOKEN}@huggingface.co/spaces/Upendrasai/Panda-AI-Official hf_space

          # Clear old files in Space (keep .git folder)
          find hf_space -mindepth 1 -not -path 'hf_space/.git*' -delete

          # Copy panda_ai/ contents to Space ROOT
          # Exclude workflow yml files — those are GitHub only
          rsync -av --exclude='*.yml' --exclude='*.yaml' panda_ai/ hf_space/

          cd hf_space

          git add -A

          git diff --staged --quiet || git commit -m "Auto-sync from GitHub: $(git -C .. rev-parse --short HEAD)"

          git push https://Upendrasai:${HF_TOKEN}@huggingface.co/spaces/Upendrasai/Panda-AI-Official main
