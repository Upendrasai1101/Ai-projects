name: Sync Panda AI to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - 'panda_ai/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push panda_ai/ contents to HF Space root
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "upendrasai1101@gmail.com"
          git config --global user.name "Upendrasai Chaturvedula"

          # Clone HF Space
          git clone https://Upendrasai:${HF_TOKEN}@huggingface.co/spaces/Upendrasai/Panda-AI-Official hf_space

          # Delete everything in Space except .git
          cd hf_space
          find . -mindepth 1 -not -path './.git*' -delete
          cd ..

          # Files are inside panda_ai/panda_ai/ (double folder)
          cp panda_ai/panda_ai/Dockerfile        hf_space/Dockerfile
          cp panda_ai/panda_ai/app.py            hf_space/app.py
          cp panda_ai/panda_ai/search_tool.py    hf_space/search_tool.py
          cp panda_ai/panda_ai/index.html        hf_space/index.html
          cp panda_ai/panda_ai/script.js         hf_space/script.js
          cp panda_ai/panda_ai/requirements.txt  hf_space/requirements.txt
          cp panda_ai/panda_ai/readme.md         hf_space/README.md

          cd hf_space

          git add -A

          git diff --staged --quiet || git commit -m "Sync from GitHub: $(git -C .. rev-parse --short HEAD)"

          git push https://Upendrasai:${HF_TOKEN}@huggingface.co/spaces/Upendrasai/Panda-AI-Official main
